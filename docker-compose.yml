version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-me-in-production}
      - POSTGRES_HOST_AUTH_METHOD=${POSTGRES_HOST_AUTH_METHOD:-trust}
      - POSTGRES_DB=core_hub_db
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./core_hub
      dockerfile: Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./core_hub:/app
    environment:
      - DJANGO_SETTINGS_MODULE=core_hub.settings
      - SECRET_KEY=${SECRET_KEY:-django-insecure-change-me-in-production}
      - DEBUG=${DEBUG:-True}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      # For local dev you may run Postgres in trust mode (no password). In production,
      # set `POSTGRES_PASSWORD` and ensure `DATABASE_URL` contains the password.
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-change-me-in-production}@db:5432/core_hub_db
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID:-key_test_placeholder}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET:-secret_test_placeholder}
      - RAZORPAY_WEBHOOK_SECRET=${RAZORPAY_WEBHOOK_SECRET:-whsec_placeholder}
      - FRONTEND_URL=http://localhost:3000
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-815443716921-mnu1ram1pmmjf9nl5b6vc35rba7l0pgm.apps.googleusercontent.com}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET:-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}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY:-1x0000000000000000000000000000000AA}
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: sh -c "mkdir -p /app/.next/dev/logs && npm run dev"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - WATCHPACK_POLLING=true
      - TURBOPACK_DISABLE_FSNOTIFY=1
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - API_URL=http://backend:8000
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-a-very-long-random-secret-change-me-in-prod}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-815443716921-mnu1ram1pmmjf9nl5b6vc35rba7l0pgm.apps.googleusercontent.com}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET:-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}
      - NEXT_PUBLIC_TURNSTILE_SITE_KEY=1x00000000000000000000AA
      - NEXT_PUBLIC_RAZORPAY_KEY_ID=${NEXT_PUBLIC_RAZORPAY_KEY_ID}
      - NEXT_PUBLIC_RAZORPAY_PLAN_WEBCAM_MO=${NEXT_PUBLIC_RAZORPAY_PLAN_WEBCAM_MO}
      - NEXT_PUBLIC_RAZORPAY_PLAN_WEBCAM_QTR=${NEXT_PUBLIC_RAZORPAY_PLAN_WEBCAM_QTR}
      - NEXT_PUBLIC_RAZORPAY_PLAN_WEBCAM_YR=${NEXT_PUBLIC_RAZORPAY_PLAN_WEBCAM_YR}
      - NEXT_PUBLIC_RAZORPAY_PLAN_HEALTH_MO=${NEXT_PUBLIC_RAZORPAY_PLAN_HEALTH_MO}
      - NEXT_PUBLIC_RAZORPAY_PLAN_HEALTH_QTR=${NEXT_PUBLIC_RAZORPAY_PLAN_HEALTH_QTR}
      - NEXT_PUBLIC_RAZORPAY_PLAN_HEALTH_YR=${NEXT_PUBLIC_RAZORPAY_PLAN_HEALTH_YR}
      - NEXT_PUBLIC_RAZORPAY_PLAN_COMBO_MO=${NEXT_PUBLIC_RAZORPAY_PLAN_COMBO_MO}
      - NEXT_PUBLIC_RAZORPAY_PLAN_COMBO_QTR=${NEXT_PUBLIC_RAZORPAY_PLAN_COMBO_QTR}
      - NEXT_PUBLIC_RAZORPAY_PLAN_COMBO_YR=${NEXT_PUBLIC_RAZORPAY_PLAN_COMBO_YR}
      - NEXT_PUBLIC_RAZORPAY_PLAN_BUSINESS=${NEXT_PUBLIC_RAZORPAY_PLAN_BUSINESS}
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # ─── DISEASE PREDICTION INTEGRATION ────────────────────────────────────

  dp_redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  dp_backend:
    build:
      context: D:/Disease Prediction
      dockerfile: web_app/backend/Dockerfile
    image: diseaseprediction-backend:latest
    ports:
      - "8001:8000"
    command: uvicorn web_app.backend.main:app --host 0.0.0.0 --port 8000
    volumes:
      - D:/Disease Prediction/web_app/backend:/app/web_app/backend
      - D:/Disease Prediction/saved_models:/app/saved_models
      - D:/Disease Prediction/saved_models_onnx:/app/saved_models_onnx
      - D:/Disease Prediction/external:/app/external
    environment:
      - REDIS_URL=redis://dp_redis:6379/0
      - ALLOWED_ORIGINS=http://localhost:5173
      - ALLOW_ALL_ORIGINS=True
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    depends_on:
      - dp_redis

  dp_worker_heavy:
    image: diseaseprediction-backend:latest
    command: celery -A web_app.backend.celery_app worker --loglevel=info --pool=threads --concurrency=2 -Q q_heavy_cv,celery
    volumes:
      - D:/Disease Prediction/web_app/backend:/app/web_app/backend
      - D:/Disease Prediction/saved_models:/app/saved_models
      - D:/Disease Prediction/saved_models_onnx:/app/saved_models_onnx
      - D:/Disease Prediction/external:/app/external
      - dp_hf_cache:/root/.cache/huggingface
    environment:
      - REDIS_URL=redis://dp_redis:6379/0
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    depends_on:
      - dp_redis
      - dp_backend

  dp_worker_light:
    image: diseaseprediction-backend:latest
    command: celery -A web_app.backend.celery_app worker --loglevel=info --pool=threads --concurrency=4 -Q q_lightweight
    volumes:
      - D:/Disease Prediction/web_app/backend:/app/web_app/backend
      - D:/Disease Prediction/saved_models:/app/saved_models
      - D:/Disease Prediction/saved_models_onnx:/app/saved_models_onnx
      - D:/Disease Prediction/external:/app/external
    environment:
      - REDIS_URL=redis://dp_redis:6379/0
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    depends_on:
      - dp_redis
      - dp_backend

  dp_frontend:
    build:
      context: D:/Disease Prediction
      dockerfile: web_app/frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - dp_backend

  dp_flower:
    image: diseaseprediction-backend:latest
    command: celery -A web_app.backend.celery_app flower --port=5555 --basic_auth=admin:changeme123
    ports:
      - "5555:5555"
    environment:
      - REDIS_URL=redis://dp_redis:6379/0
      - FLOWER_BASIC_AUTH=admin:changeme123
    depends_on:
      - dp_redis

  dp_prometheus:
    image: prom/prometheus:latest
    volumes:
      - D:/Disease Prediction/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  dp_grafana:
    image: grafana/grafana:latest
    ports:
      - "4000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-change-me-in-production}

volumes:
  postgres_data:
  dp_hf_cache:
